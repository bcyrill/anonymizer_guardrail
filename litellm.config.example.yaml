# Example LiteLLM proxy config that wires in anonymizer-guardrail.
#
# Critical pattern: the model used INTERNALLY by the anonymizer for LLM
# detection (named "anonymize" below) MUST NOT be guarded — otherwise every
# detection call would re-enter the guardrail and recurse forever.
#
# We achieve this by setting `default_on: false` on the guardrail and having
# user-facing models opt in via the `guardrails` field in client requests.

model_list:

  # ── User-facing models (these get anonymized) ──────────────────────────────
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY

  # ── Internal model used by the anonymizer's LLM detector ──────────────────
  # Pick something cheap and fast — this is called once per anonymized
  # request. Same physical backend as a user-facing model is fine; what
  # matters is that this alias is NOT in any client's `guardrails: [...]`
  # field, so it bypasses the guardrail.
  - model_name: anonymize
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  guardrails:
    - guardrail_name: anonymizer
      litellm_params:
        guardrail: generic_guardrail_api
        # Both modes are required for the round-trip to work.
        mode: [pre_call, post_call]
        api_base: http://anonymizer:8000
        # Block the request if our service is unreachable. Set to fail_open
        # if you'd rather degrade gracefully (no anonymization) than block.
        unreachable_fallback: fail_closed
        # default_on: false  ← keep this false; clients opt in per request
        # Forward the caller's Authorization header so the anonymizer can
        # reuse their virtual key for the detection LLM call (set
        # LLM_USE_FORWARDED_KEY=true on the anonymizer side too). LiteLLM
        # redacts headers to "[present]" unless they're on this allowlist.
        # extra_headers: [authorization]

        # ── Per-request override defaults ──────────────────────────────────
        # `additional_provider_specific_params` is forwarded verbatim to our
        # guardrail. Use it to set deployment-wide defaults that any single
        # request can still override via client-side `extra_body` (see the
        # client usage example at the bottom of this file).
        #
        # Recognised keys (each maps to the matching env var on the
        # anonymizer service; client-side override wins, then static config
        # below, then the env-var-configured default in the container):
        #
        #   use_faker                bool. False forces opaque [TYPE_…] tokens.
        #   faker_locale             string ("pt_BR,en_US") or list (["pt_BR", "en_US"]).
        #                            Capped at 3 locales per call (see README).
        #   detector_mode            string or list. Subset of the configured
        #                            detectors (regex, privacy_filter, llm).
        #                            Capped at 3 entries.
        #   regex_overlap_strategy   "longest" (default) or "priority".
        #   regex_patterns           NAME of a registered alternative regex
        #                            pattern set. Names are pre-declared
        #                            server-side via REGEX_PATTERNS_REGISTRY
        #                            (the request never gets to pass a path
        #                            directly — that would be a bypass
        #                            vector). Unknown name → warn + fallback.
        #   llm_model                string. Model alias the LLM detector
        #                            sends to its backend (overrides LLM_MODEL).
        #   llm_prompt               NAME of a registered alternative LLM
        #                            detection prompt — same path-safety
        #                            policy as regex_patterns. Pre-declared
        #                            server-side via LLM_SYSTEM_PROMPT_REGISTRY.
        #
        # Bad values for known keys log a warning and are dropped — the
        # request still proceeds with the next-most-specific value.
        # additional_provider_specific_params:
        #   use_faker: false
        #   regex_overlap_strategy: longest

# To use the named-alternatives mechanism, pre-declare the allowed paths
# server-side (in the env passed to the anonymizer container, NOT here).
# Both env vars take comma-separated `name=path` pairs:
#
#   REGEX_PATTERNS_REGISTRY="pentest=bundled:regex_pentest.yaml,internal=/etc/anon/internal.yaml"
#   LLM_SYSTEM_PROMPT_REGISTRY="pentest=bundled:llm_pentest.md,legal=/etc/anon/legal.md"
#
# Then per-request callers reference them by name only — never path —
# so an attacker can't redirect detection to /etc/passwd or to an
# empty file that disables redaction. Unknown names log a warning and
# fall back to the default. The reserved name "default" is rejected
# in the registry; the default always comes from REGEX_PATTERNS_PATH /
# LLM_SYSTEM_PROMPT_PATH.

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

# Client usage:
#
#   from openai import OpenAI
#   client = OpenAI(base_url="http://litellm:4000", api_key="<master_key>")
#
#   # Basic — just opt into anonymization:
#   client.chat.completions.create(
#       model="gpt-4o-mini",
#       messages=[{"role": "user", "content": "..."}],
#       guardrails=["anonymizer"],
#   )
#
#   # Per-request overrides via the dynamic-guardrail form. extra_body for
#   # this guardrail is merged into additional_provider_specific_params and
#   # forwarded to our service. See the README "Per-request overrides"
#   # section for the full key list and validation rules.
#   client.chat.completions.create(
#       model="gpt-4o-mini",
#       messages=[{"role": "user", "content": "Hi alice@corp.example."}],
#       guardrails=[
#           {"anonymizer": {"extra_body": {
#               "use_faker": True,
#               "faker_locale": "ja_JP",
#               # detector_mode subsets the configured detectors:
#               "detector_mode": ["regex", "llm"],
#               "regex_overlap_strategy": "longest",
#               "llm_model": "gpt-4o",
#               # Reference NAMED alternatives the operator pre-declared
#               # in REGEX_PATTERNS_REGISTRY / LLM_SYSTEM_PROMPT_REGISTRY.
#               # The request only sends names — never paths.
#               "regex_patterns": "pentest",
#               "llm_prompt": "legal",
#           }}}
#       ],
#   )
