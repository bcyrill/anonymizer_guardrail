[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "anonymizer-guardrail"
version = "0.1.0"
description = "LiteLLM Generic Guardrail API service for round-trip anonymization."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "you" }]
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "pydantic>=2.6",
    "httpx>=0.27",
    "faker>=25.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.12",
]
# Pulls in the dependencies needed to run the local privacy-filter NER
# detector (openai/privacy-filter on HuggingFace). Heavy: torch alone is
# ~700 MB on disk plus the model weights (~3 GB at fp32). Only install
# when DETECTOR_MODE will include `privacy_filter`.
privacy-filter = [
    "torch>=2.0",
    "transformers>=4.40",
]

[project.scripts]
anonymizer-guardrail = "anonymizer_guardrail.main:app"

[tool.hatch.build.targets.wheel]
packages = ["src/anonymizer_guardrail"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
