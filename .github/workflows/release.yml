name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            Container image:
            ```
            podman pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            See the [Packages page](${{ github.server_url }}/${{ github.repository }}/pkgs/container/${{ github.event.repository.name }}) for all tags and digests.
