name: Release

# Triggered by any vX.Y.Z* tag, but the job itself is skipped for
# flavour-variant tags (vX.Y.Z+pf, vX.Y.Z+pf-service) so they reuse the
# existing release rather than create a new one per flavour.
#
# The exclusion is enforced at the job level (`if:`) rather than via a
# negative tag pattern (`!v*+*`) because GitHub Actions' minimatch
# parser treats `+*` as the extglob "one or more" quantifier, which
# fails workflow validation with "invalid tags patterns".
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    if: ${{ !contains(github.ref_name, '+') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: false
          # Pre-release when the tag has a `-` suffix (`-rc1`, `-alpha`).
          # Flavour variants (`+pf`, `+pf-service`) are already filtered
          # at the job level above, so `-` here is unambiguous.
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Container images

            ### Guardrail (always CPU)

            ```
            # Slim — always published
            podman pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}

            # Privacy-filter built into the guardrail (in-process).
            # Published only if the matching tag ${{ github.ref_name }}+pf
            # was pushed alongside this one.
            podman pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}-pf
            ```

            ### Standalone privacy-filter-service

            Separate ghcr package; pair with the slim guardrail and
            `PRIVACY_FILTER_URL` to keep the heavy ML deps in their
            own container. Published only if the matching tag
            `${{ github.ref_name }}+pf-service` was pushed alongside.
            Both CPU and CUDA-13.0 variants are published; pull the one
            that matches your hardware.

            ```
            # CPU
            podman pull ghcr.io/${{ github.repository_owner }}/privacy-filter-service:${{ github.ref_name }}-cpu

            # CUDA 13.0
            podman pull ghcr.io/${{ github.repository_owner }}/privacy-filter-service:${{ github.ref_name }}-cu130
            ```

            Baked-model variants (`pf-baked`, `pf-service-baked`) are
            not published from CI — they're multi-GB. Build locally with
            `scripts/image_builder.sh -f pf-baked` (or `-t pf-service-baked`)
            if you need them.

            See the [Packages page](${{ github.server_url }}/${{ github.repository_owner }}?tab=packages&repo_name=${{ github.event.repository.name }}) for all available tags and digests.
