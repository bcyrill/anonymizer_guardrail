name: Release

# Triggered by any vX.Y.Z* tag, but the job itself is skipped for
# flavour-variant tags (vX.Y.Z+pf, vX.Y.Z+pf-baked) so they reuse the
# existing release rather than create a new one per flavour.
#
# The exclusion is enforced at the job level (`if:`) rather than via a
# negative tag pattern (`!v*+*`) because GitHub Actions' minimatch
# parser treats `+*` as the extglob "one or more" quantifier, which
# fails workflow validation with "invalid tags patterns".
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    if: ${{ !contains(github.ref_name, '+') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: false
          # Pre-release when the tag has a `-` suffix (`-rc1`, `-alpha`).
          # Flavour variants (`+pf`, `+pf-baked`) are already filtered at
          # the job level above, so `-` here is unambiguous.
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            Container images for this release:
            ```
            # Slim (always published)
            podman pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}

            # Privacy-filter — published only if the matching tag
            # ${{ github.ref_name }}+pf was pushed alongside this one
            podman pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}-pf

            # Privacy-filter, model baked in — published only if the
            # matching tag ${{ github.ref_name }}+pf-baked was pushed
            podman pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}-pf-baked
            ```

            See the [Packages page](${{ github.server_url }}/${{ github.repository }}/pkgs/container/${{ github.event.repository.name }}) for all available tags and digests.
