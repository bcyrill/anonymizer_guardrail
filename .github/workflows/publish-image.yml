name: Publish container image

# Triggers:
#   - push of vX.Y.Z        → slim guardrail image, tagged :vX.Y.Z (+ semver siblings)
#   - workflow_dispatch     → manual rebuild against HEAD of the default branch
#
# Slim is the only guardrail flavour. Privacy-filter and gliner-pii
# ship as standalone services published by sibling workflows
# (publish-pf-service-image.yml / publish-gliner-service-image.yml).
# Their `+pf-service` / `+gliner-service` tag suffixes are handled
# there; this workflow short-circuits on them so a single tag push
# only fires the matching workflow.
#
# Branch pushes do NOT trigger image builds — most testing happens
# locally via scripts/image_builder.sh and scripts/launcher.sh, and
# building a fresh image on every commit was producing too much registry
# churn. Use workflow_dispatch if you need an ad-hoc build off a branch.

on:
  push:
    tags: ['v*.*.*']  # also matches v*.*.*+pf-service, v*.*.*+gliner-service
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    # Skip on any +<service> tags — those are handled by the
    # per-service publish workflows (different images, different
    # Containerfiles). The skip lives at the job level rather than as a
    # negative tag pattern because GitHub Actions' minimatch parser
    # treats `+*` as the extglob "one or more" quantifier and rejects
    # the workflow with "invalid tags patterns". Skip whenever the tag
    # contains any `+` suffix; the per-service workflows then claim
    # their own slice via endsWith.
    if: ${{ !contains(github.ref_name, '+') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # The skip condition above already excludes any tag with a `+`
      # suffix, so by the time we reach this step the tag is either
      # plain semver (vX.Y.Z) or a workflow_dispatch invocation.

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # `latest=auto` (metadata-action's default) only tags :latest when
      # the ref is a stable semver — pre-release tags like v1.0.0-rc1
      # still get :v1.0.0-rc1 but not :latest. Branch refs don't apply
      # since the workflow no longer triggers on them.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=slim
          cache-to: type=gha,mode=max,scope=slim
          provenance: true
          sbom: true
